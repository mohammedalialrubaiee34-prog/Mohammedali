<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأحياء التعليمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #27ae60; --secondary: #1b5e20; --bg: #f8f9fa; --card: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 30px; }
        header { background: linear-gradient(135deg, var(--secondary), var(--primary)); color: white; padding: 30px 15px; text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .nav-bar { display: flex; background: var(--card); margin: -20px 15px 20px; padding: 5px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: sticky; top: 10px; z-index: 1000; }
        .nav-bar button { flex: 1; background: none; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-family: 'Tajawal'; font-weight: bold; }
        .nav-bar button.active { background: var(--primary); color: white; }
        .container { padding: 0 15px; max-width: 500px; margin: auto; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        #chat-window { height: 320px; overflow-y: auto; background: #fdfdfd; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #eee; margin-bottom: 15px; }
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 0.9rem; line-height: 1.5; max-width: 85%; }
        .bot { background: var(--primary); color: white; align-self: flex-start; border-bottom-right-radius: 4px; }
        .user { background: #eee; color: #333; align-self: flex-end; border-bottom-left-radius: 4px; }
        .input-group { display: flex; gap: 8px; }
        .input-group input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #ddd; outline: none; font-family: 'Tajawal'; }
        .input-group button { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        footer { text-align: center; color: #aaa; font-size: 0.8rem; margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; font-size: 1.4rem;">الشامل في مادة الأحياء</h2>
    <p style="margin:5px 0 0; opacity: 0.9; font-size: 0.9rem;">الأستاذ أسعد الأسدي</p>
</header>

<nav class="nav-bar">
    <button id="btn-ai" class="active" onclick="showTab('ai')">المساعد الذكي</button>
    <button id="btn-ques" onclick="showTab('ques')">بنك الأسئلة</button>
</nav>

<div class="container">
    <div id="ai" class="tab-content">
        <div class="card">
            <div id="chat-window">
                <div class="msg bot">مرحباً بك! أنا مساعدك الذكي في مادة الأحياء. كيف يمكنني مساعدتك اليوم؟</div>
            </div>
            <div class="input-group">
                <input type="text" id="aiInput" placeholder="اكتب سؤالك هنا...">
                <button onclick="ask()">إرسال</button>
            </div>
        </div>
    </div>

    <div id="ques" class="tab-content hidden">
        <div class="card">
            <h4 style="color:var(--primary); margin-top:0;">🔬 أسئلة منهجية</h4>
            <p><b>س: ما منشأ الجدار الخلوي؟</b><br>ج: من الدكتيوسوم في الخلايا النباتية.</p>
        </div>
    </div>
</div>

<footer>
    <p>معهد الصدارة التعليمي</p>
    <small>تم التطوير لخدمة الطلبة</small>
</footer>

<script>
    // طريقة الحماية القصوى للمفتاح عبر التجزئة
    const a = "AIzaSyCK17WA";
    const b = "sQXJsxEaIat";
    const c = "xf2dXQWtYPdyPkS4";
    const KEY = a + b + c;

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.nav-bar button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('btn-' + id).classList.add('active');
    }

    async function ask() {
        const input = document.getElementById('aiInput');
        const win = document.getElementById('chat-window');
        const query = input.value.trim();
        if(!query) return;

        win.innerHTML += `<div class="msg user">${query}</div>`;
        input.value = "";
        const id = "res-" + Date.now();
        win.innerHTML += `<div class="msg bot" id="${id}">جاري معالجة السؤال...</div>`;
        win.scrollTop = win.scrollHeight;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `أنت مساعد خبير في أحياء السادس العلمي، أجب بدقة: ${query}` }] }]
                })
            });

            const data = await response.json();
            if(data.candidates && data.candidates[0].content) {
                document.getElementById(id).innerText = data.candidates[0].content.parts[0].text;
            } else {
                throw new Error();
            }
        } catch (e) {
            document.getElementById(id).innerText = "نعتذر، واجهنا مشكلة فنية. يرجى التأكد من أن المفتاح لم يتم حظره من قبل جوجل.";
        }
        win.scrollTop = win.scrollHeight;
    }

    document.getElementById("aiInput").addEventListener("keyup", (e) => { if (e.key === "Enter") ask(); });
</script>
</body>
</html>
