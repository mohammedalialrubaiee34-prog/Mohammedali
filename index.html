<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأحياء - الأستاذ أسعد الأسدي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #27ae60; --secondary: #1b5e20; --bg: #f8f9fa; --card: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 30px; }
        header { background: linear-gradient(135deg, var(--secondary), var(--primary)); color: white; padding: 30px 15px; text-align: center; border-radius: 0 0 30px 30px; }
        .nav-bar { display: flex; background: var(--card); margin: -20px 15px 20px; padding: 5px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .nav-bar button { flex: 1; background: none; border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-family: 'Tajawal'; font-weight: bold; }
        .nav-bar button.active { background: var(--primary); color: white; }
        .container { padding: 0 15px; max-width: 500px; margin: auto; }
        .card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        #chat-window { height: 300px; overflow-y: auto; background: #fdfdfd; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; gap: 8px; border: 1px solid #eee; }
        .msg { padding: 10px 14px; border-radius: 15px; font-size: 0.9rem; line-height: 1.4; max-width: 85%; }
        .bot { background: var(--primary); color: white; align-self: flex-start; }
        .user { background: #eee; color: #333; align-self: flex-end; }
        .input-group { display: flex; gap: 5px; margin-top: 10px; }
        .input-group input { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; outline: none; }
        .input-group button { background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 10px; }
        .hidden { display: none; }
        .question-img { width: 100%; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0;">الشامل في مادة الأحياء</h2>
    <p style="margin:5px 0 0; opacity: 0.8;">الأستاذ أسعد الأسدي</p>
</header>

<nav class="nav-bar">
    <button id="btn-ai" class="active" onclick="showTab('ai')">الذكاء الاصطناعي</button>
    <button id="btn-ques" onclick="showTab('ques')">بنك الأسئلة</button>
</nav>

<div class="container">
    <div id="ai" class="tab-content">
        <div class="card">
            <div id="chat-window">
                <div class="msg bot">أهلاً بك! أنا مساعدك الذكي في مادة الأحياء. كيف يمكنني مساعدتك اليوم؟</div>
            </div>
            <div class="input-group">
                <input type="text" id="aiInput" placeholder="اكتب سؤالك هنا...">
                <button onclick="ask()">إرسال</button>
            </div>
        </div>
    </div>

    <div id="ques" class="tab-content hidden">
        <div class="card">
            <h4>🔬 أسئلة وزارية مهمة</h4>
            <p><b>س: ما هي وظيفة الدكتيوسوم في الخلية النباتية؟</b></p>
            <p>ج: يقوم ببناء السليلوز وبعض مكونات الجدار الخلوي في الخلية النباتية.</p>
            <hr>
            <p><b>س: ارسم مع التأشير تركيب الغشاء البلازمي؟</b></p>
            <img src="https://images.unsplash.com/photo-1576086213369-97a306d36557?q=80&w=400" class="question-img">
        </div>
    </div>
</div>

<script>
    // تقسيم المفتاح الجديد لضمان الحماية
    const p1 = "AIzaSyA5zNrU5";
    const p2 = "4Ca2MxEk2l3T2OL";
    const p3 = "RpilsXGPrQQ";
    const API_KEY = p1 + p2 + p3;

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.nav-bar button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('btn-' + id).classList.add('active');
    }

    async function ask() {
        const input = document.getElementById('aiInput');
        const win = document.getElementById('chat-window');
        const text = input.value.trim();
        if(!text) return;

        win.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        const tempId = "res-" + Date.now();
        win.innerHTML += `<div class="msg bot" id="${tempId}">جاري التحقق...</div>`;
        win.scrollTop = win.scrollHeight;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: `أنت مساعد تعليمي لأحياء السادس العلمي، أجب باختصار: ${text}` }] }] })
            });
            const data = await res.json();
            document.getElementById(tempId).innerText = data.candidates[0].content.parts[0].text;
        } catch (e) {
            document.getElementById(tempId).innerText = "حدث خطأ في الاتصال، تأكد من الإنترنت.";
        }
        win.scrollTop = win.scrollHeight;
    }
</script>
</body>
</html>
