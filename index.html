<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأحياء - الأستاذ أسعد الأسدي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #27ae60; --secondary: #1b5e20; --bg: #f8f9fa; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; padding: 0; overflow-x: hidden; }
        header { background: linear-gradient(135deg, var(--secondary), var(--primary)); color: white; padding: 25px 10px; text-align: center; border-radius: 0 0 25px 25px; }
        .nav-bar { display: flex; background: white; margin: -15px 15px 15px; padding: 5px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .nav-bar button { flex: 1; background: none; border: none; padding: 10px; cursor: pointer; font-family: 'Tajawal'; font-weight: bold; font-size: 0.9rem; }
        .nav-bar button.active { background: var(--primary); color: white; border-radius: 8px; }
        .container { padding: 10px; max-width: 500px; margin: auto; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        #chat-window { height: 300px; overflow-y: auto; background: #fcfcfc; border-radius: 10px; padding: 10px; border: 1px solid #eee; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px; border-radius: 12px; font-size: 0.85rem; line-height: 1.4; max-width: 80%; }
        .bot { background: var(--primary); color: white; align-self: flex-start; }
        .user { background: #eee; color: #333; align-self: flex-end; }
        .input-group { display: flex; gap: 5px; margin-top: 10px; }
        .input-group input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; outline: none; }
        .input-group button { background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; font-size: 1.2rem;">الشامل في مادة الأحياء</h2>
    <p style="margin:5px 0 0; font-size: 0.8rem; opacity: 0.9;">الأستاذ أسعد الأسدي</p>
</header>

<nav class="nav-bar">
    <button id="btn-ai" class="active" onclick="showTab('ai')">المساعد الذكي</button>
    <button id="btn-ques" onclick="showTab('ques')">بنك الأسئلة</button>
</nav>

<div class="container">
    <div id="ai" class="tab-content">
        <div class="card">
            <div id="chat-window">
                <div class="msg bot">مرحباً بطلاب معهد الصدارة! أنا مساعدكم المرتبط بـ ChatGPT. اسألني أي سؤال في الأحياء؟</div>
            </div>
            <div class="input-group">
                <input type="text" id="aiInput" placeholder="اكتب سؤالك هنا...">
                <button onclick="ask()">إرسال</button>
            </div>
        </div>
    </div>

    <div id="ques" class="tab-content hidden">
        <div class="card">
            <h4 style="margin-top:0; color:var(--primary);">🔬 وزاريات الفصل الأول</h4>
            <p><b>س: ما منشأ الجدار الخلوي؟</b><br>ج: من الدكتيوسوم (الشبكة الكروماتينية في الخلية النباتية).</p>
        </div>
    </div>
</div>

<script>
    // ChatGPT API Key (OpenAI)
    // براء، ضع مفتاح ChatGPT الخاص بك هنا مقسماً كما فعلنا سابقاً
    const chatKey = "ضع_مفتاح_CHATGPT_هنا"; 

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.nav-bar button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('btn-' + id).classList.add('active');
    }

    async function ask() {
        const input = document.getElementById('aiInput');
        const win = document.getElementById('chat-window');
        const userText = input.value.trim();
        if(!userText) return;

        win.innerHTML += `<div class="msg user">${userText}</div>`;
        input.value = "";
        const tempId = "res-" + Date.now();
        win.innerHTML += `<div class="msg bot" id="${tempId}">جاري التفكير... 🧠</div>`;
        win.scrollTop = win.scrollHeight;

        try {
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${chatKey}`
                },
                body: JSON.stringify({
                    model: "gpt-3.5-turbo",
                    messages: [{role: "system", content: "أنت مدرس أحياء عراقي خبير لطلاب الأستاذ أسعد الأسدي، تجيب باختصار ودقة."}, {role: "user", content: userText}]
                })
            });

            const data = await response.json();
            if(data.choices) {
                document.getElementById(tempId).innerText = data.choices[0].message.content;
            } else {
                throw new Error();
            }
        } catch (e) {
            document.getElementById(tempId).innerText = "⚠️ تأكد من إضافة رصيد لمفتاح ChatGPT أو جرب Gemini.";
        }
        win.scrollTop = win.scrollHeight;
    }
</script>
</body>
</html>
